name: Update Food Craft Knowledge Base (Weekly)

on:
  schedule:
    # 每周日凌晨3点（北京时间）更新
    - cron: '0 19 * * 0'
  workflow_dispatch:  # 支持手动触发

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
      
      - name: Update price data
        env:
          API_KEY: ${{ secrets.PRICE_API_KEY }}
        run: |
          python scripts/update_prices.py
      
      - name: Update seasonal calendar
        run: |
          python scripts/update_seasonal.py
      
      - name: Validate data
        run: |
          python scripts/validate_knowledge.py
      
      - name: Commit changes
        run: |
          git config user.name "Food Craft Bot"
          git config user.email "bot@foodcraft.dev"
          git add knowledge/price_index.json
          git add knowledge/seasonal_calendar.json
          git diff --staged --quiet || git commit -m "chore: update price and seasonal data [skip ci]"
          git push
