name: Update Food Craft Knowledge Base (Weekly)

on:
  schedule:
    - cron: '0 19 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Validate data
        run: |
          python scripts/validate_knowledge.py
      
      - name: Commit changes
        run: |
          git config user.name "Food Craft Bot"
          git config user.email "bot@foodcraft.dev"
          git add -A
          git diff --staged --quiet || git commit -m "chore: weekly validation [skip ci]"
          git push
